{% extends "todos/base.html" %}
{% block title %}Login - TodoApp{% endblock %}

{% block content %}
<div class="card">
    <h1>Login</h1>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
            <div class="alert alert-error">Invalid username or password.</div>
        {% endif %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="input" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="input" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="text-center mt-2">
        Don't have an account? <a href="{% url 'register' %}" style="color:#764ba2">Register</a>
    </p>
</div>
{% endblock %}
